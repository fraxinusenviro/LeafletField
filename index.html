<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Field Mapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="https-warning" class="https-warning hidden">
      Geolocation may require HTTPS (or localhost) to work reliably.
    </div>
    <div id="map"></div>

    <aside id="tools-panel" class="tools-panel hidden">
      <section>
        <h3>Basemap</h3>
        <p>Use the top-right basemap control to switch layers.</p>
      </section>

      <section>
        <h3>Sketch</h3>
        <button id="clear-features" type="button">Clear all features</button>
      </section>

      <section>
        <h3>Feature Attributes</h3>
        <label>Name <input id="attr-name" type="text" /></label>
        <label>Type <input id="attr-type" type="text" /></label>
        <label>Notes <textarea id="attr-notes" rows="3"></textarea></label>
        <button id="save-attrs" type="button">Save selected feature</button>
        <div id="measurements"></div>
      </section>

      <section>
        <h3>GPS Tools</h3>
        <div class="grid-2">
          <button id="gps-enable" type="button">Enable GPS</button>
          <button id="gps-add-point" type="button">Add GPS Point</button>
          <button id="gps-stream" type="button">Start GPS Stream</button>
          <button id="gps-line" type="button">Start Line Recording</button>
          <button id="gps-polygon" type="button">Start Polygon Recording</button>
        </div>
        <label>Min distance (m) <input id="gps-min-distance" type="number" min="0" step="0.5" value="3" /></label>
        <label>Min interval (s) <input id="gps-min-interval" type="number" min="0" step="0.5" value="1" /></label>
        <label>Max accuracy (m) <input id="gps-max-accuracy" type="number" min="1" step="1" value="25" /></label>
        <div id="gps-status">GPS inactive</div>
      </section>

      <section>
        <h3>Layers & Styling</h3>
        <label><input id="vis-point" type="checkbox" checked /> Show points</label>
        <label><input id="vis-line" type="checkbox" checked /> Show lines</label>
        <label><input id="vis-polygon" type="checkbox" checked /> Show polygons</label>

        <h4>Points</h4>
        <label>Color <input id="style-point-color" type="color" value="#e63946" /></label>
        <label>Size <input id="style-point-size" type="number" min="3" max="20" value="7" /></label>

        <h4>Lines</h4>
        <label>Stroke <input id="style-line-color" type="color" value="#1d3557" /></label>
        <label>Width <input id="style-line-width" type="number" min="1" max="12" value="3" /></label>

        <h4>Polygons</h4>
        <label>Stroke <input id="style-polygon-color" type="color" value="#457b9d" /></label>
        <label>Width <input id="style-polygon-width" type="number" min="1" max="12" value="2" /></label>
        <label>Fill <input id="style-polygon-fill" type="color" value="#a8dadc" /></label>
        <label>Fill opacity <input id="style-polygon-opacity" type="number" min="0" max="1" step="0.1" value="0.4" /></label>
      </section>

      <section>
        <h3>Import / Export</h3>
        <button id="download-geojson" type="button">Download GeoJSON</button>
        <label>Import mode
          <select id="import-mode">
            <option value="replace">Replace</option>
            <option value="merge">Merge</option>
          </select>
        </label>
        <input id="import-file" type="file" accept=".geojson,.json,application/json" />
      </section>
    </aside>

    <div id="status-bar" class="status-bar">Mode: Sketch | GPS accuracy: n/a</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
