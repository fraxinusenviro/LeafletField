<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Field Mapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="https-warning" class="https-warning hidden">
      Geolocation may require HTTPS (or localhost) to work reliably.
    </div>
    <header class="app-header">
      <img
        class="app-logo"
        src="https://static.wixstatic.com/media/7e7d52_71c1430e410040a5936a82003b184f41~mv2.jpg/v1/fill/w_744,h_186,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/LOGO%20TEXT%20c2%20white%20green.jpg"
        alt="Logo"
      />
    </header>
    <div id="map">
      <div id="map-crosshair" class="map-crosshair hidden" aria-hidden="true"></div>
    </div>

    <aside id="tools-panel" class="tools-panel hidden">
      <button id="tools-close" class="tools-close-btn" type="button" aria-label="Close tools menu" title="Close">
        X
      </button>
      <section>
        <h3>Sketch</h3>
        <button id="clear-features" type="button">Clear all features</button>
      </section>

      <section>
        <h3>Survey Metadata</h3>
        <label>META_Surveyor <input id="meta-surveyor" type="text" /></label>
        <label>META_Project <input id="meta-project" type="text" /></label>
        <label>META_Site <input id="meta-site" type="text" /></label>
        <label>META_Date <input id="meta-date" type="text" readonly /></label>
      </section>

      <section id="gps-tools">
        <h3>GPS Tools</h3>
        <label>Min distance (m) <input id="gps-min-distance" type="number" min="0" step="0.5" value="3" /></label>
        <label>Min interval (s) <input id="gps-min-interval" type="number" min="0" step="0.5" value="1" /></label>
        <label>Max accuracy (m) <input id="gps-max-accuracy" type="number" min="1" step="1" value="25" /></label>
        <div id="gps-status">GPS inactive</div>
      </section>

      <section>
        <h3>Layers & Styling</h3>
        <div class="layer-row">
          <span class="layer-geom">Point</span>
          <input id="vis-point" type="checkbox" checked />
          <input id="style-point-color" type="color" value="#e63946" />
          <input id="style-point-size" type="number" min="3" max="20" value="7" />
        </div>
        <div class="layer-row">
          <span class="layer-geom">Line</span>
          <input id="vis-line" type="checkbox" checked />
          <input id="style-line-color" type="color" value="#1d3557" />
          <input id="style-line-width" type="number" min="1" max="12" value="3" />
        </div>
        <div class="layer-row">
          <span class="layer-geom">Polygon</span>
          <input id="vis-polygon" type="checkbox" checked />
          <input id="style-polygon-color" type="color" value="#457b9d" />
          <input id="style-polygon-width" type="number" min="1" max="12" value="2" />
        </div>
      </section>

      <section>
        <h3>Import / Export</h3>
        <button id="download-geojson" type="button">Download GeoJSON</button>
        <label>Import mode
          <select id="import-mode">
            <option value="replace">Replace</option>
            <option value="merge">Merge</option>
          </select>
        </label>
        <input id="import-file" type="file" accept=".geojson,.json,application/json" />
      </section>
    </aside>

    <div id="coord-hud" class="coord-hud">
      <button id="copy-coords" type="button" aria-label="Copy coordinates" title="Copy coordinates">⧉</button>
      <div class="coord-stack">
        <div id="status-bar" class="hud-mode">Mode: Sketch | GPS accuracy: n/a</div>
        <div id="coord-latlon">Lat/Lon: --</div>
        <div id="coord-utm">UTM: --</div>
        <div id="grid-info" class="grid-info hidden">Grid: --</div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
